<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- background -->
  <rect width="1200" height="630" fill="#f9f6f0"/>
  <!-- top accent bar -->
  <rect width="1200" height="5" fill="#1e7a42"/>
  <!-- left margin rule -->
  <rect x="80" y="60" width="2" height="510" fill="#1e7a42" opacity="0.3"/>

  <!-- wordmark -->
  <text x="110" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="normal" fill="#1a1a18" letter-spacing="-1">The Nightly Librarian</text>

  <!-- rule under wordmark -->
  <rect x="110" y="205" width="980" height="1" fill="#1a1a18" opacity="0.15"/>

  <!-- tagline -->
  <text x="110" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#6a6860" letter-spacing="0.08em">AI SIGNAL WITHOUT THE NOISE</text>

  <!-- descriptor -->
  <text x="110" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="normal" fill="#1a1a18" opacity="0.85">Daily intelligence for builders and operators.</text>
  <text x="110" y="385" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="normal" fill="#1a1a18" opacity="0.85">What changed. Why it matters. What to do.</text>

  <!-- bottom rule -->
  <rect x="80" y="530" width="1040" height="1" fill="#1a1a18" opacity="0.15"/>

  <!-- domain -->
  <text x="110" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#1e7a42" letter-spacing="0.04em">thenightlylibrarian.com</text>

  <!-- moon glyph -->
  <text x="1080" y="570" font-family="-apple-system, sans-serif" font-size="36" fill="#1e7a42" opacity="0.6">☾</text>
</svg>
